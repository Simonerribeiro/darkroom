<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fundo -->
  <rect width="32" height="32" rx="4" fill="#0a0a0a"/>
  
  <!-- Orelha esquerda -->
  <polygon points="7,14 4,4 13,10" fill="#ff6b00"/>
  
  <!-- Orelha direita -->
  <polygon points="25,14 28,4 19,10" fill="#ff6b00"/>
  
  <!-- Cabeça -->
  <circle cx="16" cy="19" r="11" fill="#ff6b00"/>
  
  <!-- Olho esquerdo -->
  <ellipse cx="12" cy="17" rx="2.5" ry="3" fill="#0a0a0a"/>
  <circle cx="12.8" cy="16" r="1" fill="#ffffff"/>
  
  <!-- Olho direito -->
  <ellipse cx="20" cy="17" rx="2.5" ry="3" fill="#0a0a0a"/>
  <circle cx="20.8" cy="16" r="1" fill="#ffffff"/>
  
  <!-- Nariz -->
  <polygon points="16,20 14,22 18,22" fill="#0a0a0a"/>
  
  <!-- Bigodes esquerda -->
  <line x1="5" y1="20" x2="13" y2="20" stroke="#0a0a0a" stroke-width="0.8"/>
  <line x1="5" y1="22" x2="13" y2="21.5" stroke="#0a0a0a" stroke-width="0.8"/>
  
  <!-- Bigodes direita -->
  <line x1="19" y1="20" x2="27" y2="20" stroke="#0a0a0a" stroke-width="0.8"/>
  <line x1="19" y1="21.5" x2="27" y2="22" stroke="#0a0a0a" stroke-width="0.8"/>
</svg>
